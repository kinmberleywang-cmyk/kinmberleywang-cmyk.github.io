<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>英语通 · 全场景英语学习</title>
<style>
  :root {
    --bg: #f8f7f4;
    --bg-card: rgba(255,255,255,0.72);
    --bg-card-hover: rgba(255,255,255,0.88);
    --border: rgba(0,0,0,0.06);
    --text: #2c2a26;
    --text-muted: #8a8578;
    --accent: #7c6f5b;
    --accent-light: rgba(124,111,91,0.1);
    --done: #8bab7e;
    --danger: #c45c5c;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.04);
    --shadow-hover: 0 6px 24px rgba(0,0,0,0.08);
    --font: -apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1916;
      --bg-card: rgba(255,255,255,0.05);
      --bg-card-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.06);
      --text: #e8e4dc;
      --text-muted: #9a9488;
      --accent: #c4b69a;
      --accent-light: rgba(196,182,154,0.08);
      --shadow: 0 2px 12px rgba(0,0,0,0.2);
      --shadow-hover: 0 6px 24px rgba(0,0,0,0.3);
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; }

  /* 顶部导航 */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px) saturate(1.2);
  }
  .topbar h1 { font-size: 18px; font-weight: 600; }
  .topbar .stats { display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); }
  .topbar .stats span { display: flex; align-items: center; gap: 4px; }
  .topbar .stats .num { font-weight: 700; color: var(--accent); font-size: 14px; }

  /* 底部导航 */
  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    display: flex;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(20px) saturate(1.2);
  }
  .tabbar .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 0 6px;
    font-size: 10px; color: var(--text-muted);
    cursor: pointer; transition: color 0.2s;
    border: none; background: none; font-family: inherit;
  }
  .tabbar .tab.active { color: var(--accent); }
  .tabbar .tab .tab-icon { font-size: 20px; margin-bottom: 2px; }

  /* 页面容器 */
  .page { display: none; padding: 20px; padding-bottom: 80px; }
  .page.active { display: block; }

  /* 通用卡片 */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    backdrop-filter: blur(20px) saturate(1.2);
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: var(--shadow-hover); }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.6; }

  /* ===== 词汇模块 ===== */
  .vocab-category { margin-bottom: 24px; }
  .vocab-cat-title { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .vocab-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px; margin-bottom: 8px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer; transition: all 0.2s;
  }
  .vocab-item:hover { box-shadow: var(--shadow-hover); }
  .vocab-item.expanded .vocab-detail { display: block; }
  .vocab-main { flex: 1; }
  .vocab-word { font-size: 15px; font-weight: 600; }
  .vocab-phonetic { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .vocab-meaning { font-size: 13px; margin-top: 4px; }
  .vocab-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .vocab-sentence { font-size: 13px; line-height: 1.7; margin-bottom: 6px; }
  .vocab-sentence .en { font-weight: 500; }
  .vocab-sentence .zh { color: var(--text-muted); font-size: 12px; }
  .vocab-context { font-size: 12px; color: var(--text-muted); background: var(--accent-light); padding: 8px 10px; border-radius: var(--radius-sm); margin-top: 6px; line-height: 1.6; }

  .speak-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px;
    border: none; border-radius: 50%;
    background: var(--accent-light); color: var(--accent);
    font-size: 12px; cursor: pointer; flex-shrink: 0;
    transition: all 0.2s; padding: 0;
  }
  .speak-btn:hover { background: var(--accent); color: #fff; }
  .speak-btn.playing { background: var(--accent); color: #fff; animation: pulse 0.8s ease infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.15)} }

  .vocab-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .vocab-filter {
    padding: 6px 14px; border-radius: 20px;
    font-size: 12px; font-family: inherit;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-muted); cursor: pointer; transition: all 0.2s;
  }
  .vocab-filter.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .vocab-mastered { font-size: 11px; color: var(--done); margin-left: auto; cursor: pointer; border: none; background: none; font-family: inherit; }
  .vocab-mastered.done { color: var(--done); }

  /* ===== 口语模块 ===== */
  .scene-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .scene-btn {
    padding: 8px 16px; border-radius: 20px;
    font-size: 12px; font-family: inherit;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-muted); cursor: pointer; transition: all 0.2s;
  }
  .scene-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .dialog-box {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  }
  .dialog-line { display: flex; gap: 10px; margin-bottom: 12px; }
  .dialog-line.user { flex-direction: row-reverse; }
  .dialog-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    background: var(--accent-light);
  }
  .dialog-line.user .dialog-avatar { background: rgba(139,175,126,0.15); }
  .dialog-bubble {
    max-width: 75%; padding: 10px 14px;
    border-radius: 12px; font-size: 13px; line-height: 1.6;
  }
  .dialog-line:not(.user) .dialog-bubble { background: var(--bg-card-hover); }
  .dialog-line.user .dialog-bubble { background: var(--accent-light); }

  .dialog-input-row { display: flex; gap: 8px; margin-top: 12px; }
  .dialog-input {
    flex: 1; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 12px; font-size: 13px; font-family: inherit;
    background: var(--bg); color: var(--text);
  }
  .dialog-input:focus { outline: none; border-color: var(--accent); }

  .dialog-submit {
    padding: 10px 18px; border: none; border-radius: var(--radius-sm);
    background: var(--accent); color: #fff;
    font-size: 13px; font-family: inherit; cursor: pointer;
    transition: opacity 0.2s;
  }
  .dialog-submit:hover { opacity: 0.85; }
  .dialog-submit:disabled { opacity: 0.5; }

  .mic-btn {
    width: 40px; height: 40px; border: none; border-radius: 50%;
    background: var(--bg-card); border: 1px solid var(--border);
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .mic-btn:hover { border-color: var(--accent); }
  .mic-btn.recording {
    background: var(--danger); color: #fff; border-color: var(--danger);
    animation: mic-pulse 1s ease infinite;
  }
  @keyframes mic-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(196,92,92,0.3)}50%{box-shadow:0 0 0 8px rgba(196,92,92,0)} }

  .dialog-feedback {
    margin-top: 12px; padding: 12px;
    background: var(--accent-light); border-radius: var(--radius-sm);
    border-left: 3px solid var(--accent);
    font-size: 12px; line-height: 1.7; display: none;
  }

  /* ===== 语法模块 ===== */
  .grammar-card { cursor: pointer; }
  .grammar-card.expanded .grammar-detail { display: block; }
  .grammar-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .grammar-example { padding: 8px 12px; background: var(--accent-light); border-radius: var(--radius-sm); margin-bottom: 8px; font-size: 13px; line-height: 1.7; }
  .grammar-example .wrong { color: var(--danger); text-decoration: line-through; }
  .grammar-example .right { color: var(--done); font-weight: 500; }
  .grammar-quiz { margin-top: 12px; }
  .grammar-quiz .quiz-q { font-size: 13px; margin-bottom: 8px; font-weight: 500; }
  .grammar-quiz .quiz-options { display: flex; flex-direction: column; gap: 6px; }
  .grammar-quiz .quiz-opt {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text);
    cursor: pointer; transition: all 0.2s; text-align: left;
  }
  .grammar-quiz .quiz-opt:hover { border-color: var(--accent); }
  .grammar-quiz .quiz-opt.correct { background: rgba(139,175,126,0.15); border-color: var(--done); color: var(--done); }
  .grammar-quiz .quiz-opt.wrong { background: rgba(196,92,92,0.1); border-color: var(--danger); color: var(--danger); }
  .grammar-quiz .quiz-opt:disabled { cursor: default; }
  .quiz-explain { margin-top: 8px; font-size: 12px; color: var(--text-muted); line-height: 1.6; display: none; }

  /* ===== 听力模块 ===== */
  .listen-card { margin-bottom: 12px; }
  .listen-play {
    display: flex; align-items: center; gap: 10px;
    padding: 12px; background: var(--accent-light);
    border-radius: var(--radius-sm); cursor: pointer;
    border: none; width: 100%; font-family: inherit;
    transition: all 0.2s;
  }
  .listen-play:hover { background: var(--accent); color: #fff; }
  .listen-play .play-icon { font-size: 24px; }
  .listen-play .play-text { font-size: 13px; text-align: left; flex: 1; }
  .listen-play .play-speed { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  .listen-options { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .listen-opt {
    padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text);
    cursor: pointer; transition: all 0.2s; text-align: left;
  }
  .listen-opt:hover { border-color: var(--accent); }
  .listen-opt.correct { background: rgba(139,175,126,0.15); border-color: var(--done); }
  .listen-opt.wrong { background: rgba(196,92,92,0.1); border-color: var(--danger); }
  .listen-opt:disabled { cursor: default; }
  .listen-answer { margin-top: 10px; font-size: 12px; color: var(--text-muted); line-height: 1.7; display: none; padding: 10px; background: var(--accent-light); border-radius: var(--radius-sm); }

  .speed-btns { display: flex; gap: 6px; margin-bottom: 12px; }
  .speed-btn {
    padding: 4px 12px; border-radius: 12px; font-size: 11px;
    border: 1px solid var(--border); background: var(--bg-card);
    cursor: pointer; font-family: inherit;
  }
  .speed-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ===== 进度模块 ===== */
  .progress-summary {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px;
    margin-bottom: 20px;
  }
  .progress-summary-item {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 10px; text-align: center; backdrop-filter: blur(20px) saturate(1.2);
  }
  .progress-summary-item .ps-num { font-size: 26px; font-weight: 700; color: var(--accent); }
  .progress-summary-item .ps-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .progress-module { margin-bottom: 16px; }
  .progress-module-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0;
    border-bottom: none;
  }
  .progress-module-header .pmh-left { display: flex; align-items: center; gap: 8px; }
  .progress-module-header .pmh-icon { font-size: 18px; }
  .progress-module-header .pmh-title { font-size: 14px; font-weight: 600; }
  .progress-module-header .pmh-stats { font-size: 12px; color: var(--text-muted); }
  .progress-module-header .pmh-bar { display: flex; align-items: center; gap: 8px; }
  .progress-module-header .pmh-pct { font-size: 16px; font-weight: 700; color: var(--accent); }
  .progress-module-body {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 0 0 var(--radius) var(--radius);
    padding: 14px;
  }

  .progress-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .progress-chip {
    padding: 6px 12px; border-radius: 16px; font-size: 11px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text-muted);
    display: flex; align-items: center; gap: 4px;
  }
  .progress-chip.done { background: rgba(139,175,126,0.12); border-color: var(--done); color: var(--done); }

  .progress-bar-wrap { margin-top: 10px; }
  .progress-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .progress-bar-track { height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.4s; }
  .progress-bar-fill.done { background: var(--done); }

  .progress-streak {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px; margin-bottom: 16px; text-align: center;
  }
  .progress-streak .streak-num { font-size: 36px; font-weight: 700; color: var(--accent); }
  .progress-streak .streak-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  @media (max-width: 500px) { .progress-summary { grid-template-columns: 1fr 1fr; } }

  .export-btn {
    padding: 10px 24px; border: none; border-radius: var(--radius-sm);
    background: var(--accent); color: #fff;
    font-size: 13px; font-family: inherit; cursor: pointer;
    transition: opacity 0.2s;
  }
  .export-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<div class="topbar">
  <h1>英语通</h1>
  <div class="stats">
    <span>已学 <span class="num" id="statLearned">0</span> 词</span>
    <span>连续 <span class="num" id="statDays">1</span> 天</span>
  </div>
</div>

<!-- ===== 词汇页 ===== -->
<div class="page active" id="page-vocab">
  <div class="vocab-filters" id="vocabFilters"></div>
  <div id="vocabList"></div>
</div>

<!-- ===== 口语页 ===== -->
<div class="page" id="page-speaking">
  <div class="scene-selector" id="sceneSelector"></div>
  <div class="dialog-box" id="dialogBox"></div>
  <div class="dialog-feedback" id="dialogFeedback"></div>
</div>

<!-- ===== 语法页 ===== -->
<div class="page" id="page-grammar">
  <div id="grammarList"></div>
</div>

<!-- ===== 听力页 ===== -->
<div class="page" id="page-listening">
  <div class="speed-btns">
    <button class="speed-btn active" data-speed="0.7">慢速</button>
    <button class="speed-btn" data-speed="0.85">正常</button>
    <button class="speed-btn" data-speed="1.0">快速</button>
  </div>
  <div id="listenList"></div>
</div>

<!-- ===== 进度页 ===== -->
<div class="page" id="page-progress">
  <div class="progress-streak" id="progressStreak"></div>
  <div class="progress-summary" id="progressSummary"></div>
  <div id="progressModules"></div>
  <div style="text-align:center;margin-top:16px">
    <button class="export-btn" onclick="exportProgress()">导出进度</button>
    <div id="exportMsg" style="font-size:11px;color:var(--text-muted);margin-top:6px;display:none"></div>
  </div>
</div>

<!-- 底部导航 -->
<div class="tabbar">
  <button class="tab active" data-page="vocab"><span class="tab-icon">📚</span>词汇</button>
  <button class="tab" data-page="speaking"><span class="tab-icon">🗣️</span>口语</button>
  <button class="tab" data-page="grammar"><span class="tab-icon">✏️</span>语法</button>
  <button class="tab" data-page="listening"><span class="tab-icon">🎧</span>听力</button>
  <button class="tab" data-page="progress"><span class="tab-icon">📊</span>进度</button>
</div>

<script>
// ===== 数据库 =====
const vocabDB = [
  // =====================================================
  // 一、外贸商务（约60词）
  // =====================================================

  // -- 1.1 贸易术语 --
  { cat:'外贸商务', subcat:'贸易术语', word:'quotation', phonetic:'/kwəˈteɪʃn/', meaning:'n. 报价；报价单', sentence:'Please send us the quotation for 500 units.', zh:'请发给我们500件的报价单。', context:'外贸最基础的文件之一。', difficulty:1 },
  { cat:'外贸商务', subcat:'贸易术语', word:'FOB', phonetic:'Free On Board', meaning:'n. 离岸价', sentence:'We offer FOB Shenzhen at $12.50 per piece.', zh:'FOB深圳价每件12.50美元。', context:'最常见的贸易术语，货物越过船舷后风险转移。', difficulty:1 },
  { cat:'外贸商务', subcat:'贸易术语', word:'CIF', phonetic:'Cost, Insurance and Freight', meaning:'n. 到岸价', sentence:'The CIF price includes ocean freight and insurance.', zh:'CIF价格包含海运费和保险。', context:'比FOB多了运费和保险，买方更省心。', difficulty:2 },
  { cat:'外贸商务', subcat:'贸易术语', word:'L/C', phonetic:'Letter of Credit', meaning:'n. 信用证', sentence:'Payment by irrevocable L/C at sight.', zh:'不可即期信用证付款。', context:'国际贸易中银行担保的付款方式。', difficulty:2 },
  { cat:'外贸商务', subcat:'贸易术语', word:'MOQ', phonetic:'Minimum Order Quantity', meaning:'n. 最小起订量', sentence:'The MOQ for this item is 300 pieces.', zh:'这款产品的最小起订量是300件。', context:'谈判时经常需要协商的关键数字。', difficulty:1 },
  { cat:'外贸商务', subcat:'贸易术语', word:'lead time', phonetic:'/liːd taɪm/', meaning:'n. 交货周期', sentence:'The lead time is 25-30 days after deposit.', zh:'交货周期是收到定金后25-30天。', context:'从下单到交货的时间。', difficulty:1 },
  { cat:'外贸商务', subcat:'贸易术语', word:'proforma invoice', phonetic:'/ˌproʊfɔːrmə ˈɪnvɔɪs/', meaning:'n. 形式发票', sentence:'We will issue a proforma invoice for your reference.', zh:'我们会开具形式发票供您参考。', context:'正式合同前的预开发票。', difficulty:2 },
  { cat:'外贸商务', subcat:'贸易术语', word:'sample', phonetic:'/ˈsæmpl/', meaning:'n. 样品', sentence:'Could you send us a sample first?', zh:'能先寄个样品给我们吗？', context:'客户下单前通常要求看样品。', difficulty:1 },
  { cat:'外贸商务', subcat:'贸易术语', word:'deposit', phonetic:'/dɪˈpɑːzɪt/', meaning:'n. 定金/押金', sentence:'Please arrange the 30% deposit.', zh:'请安排30%的定金。', context:'通常定金比例在30%-50%之间。', difficulty:1 },
  { cat:'外贸商务', subcat:'贸易术语', word:'balance', phonetic:'/ˈbæləns/', meaning:'n. 余额；尾款', sentence:'The balance should be paid before shipment.', zh:'尾款应在发货前付清。', context:'定金之外的剩余款项。', difficulty:1 },

// ===== 每日内容生成（基于日期种子） =====
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function shuffleWithSeed(arr, rng) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateDailyContent() {
  const today = new Date().toISOString().slice(0,10);
  const seed = today.split('-').join('') * 1;
  const rng = seededRandom(seed);

  // 检查是否有到期的复习内容
  const dueForReview = getDueReviewItems();

  // 每日抽取数量
  const DAILY_VOCAB = 50;
  const DAILY_GRAMMAR = 2;
  const DAILY_LISTEN = 3;
  const DAILY_SPEAKING = 1;

  // 词汇：优先复习到期的，不足则从新词补
  let todayVocab;
  if (dueForReview.vocab.length >= DAILY_VOCAB) {
    todayVocab = shuffleWithSeed(dueForReview.vocab, rng).slice(0, DAILY_VOCAB);
  } else {
    const reviewPart = dueForReview.vocab;
    const newWords = vocabDB.filter(v => !reviewPart.some(r => r.word === v.word));
    const needMore = DAILY_VOCAB - reviewPart.length;
    todayVocab = [...reviewPart, ...shuffleWithSeed(newWords, rng).slice(0, needMore)];
  }

  // 语法：从所有语法中随机抽取
  const todayGrammar = shuffleWithSeed(grammarDB.map((g,i) => i), rng).slice(0, DAILY_GRAMMAR);

  // 听力：从所有听力中随机抽取
  const todayListen = shuffleWithSeed(listenDB.map((l,i) => i), rng).slice(0, DAILY_LISTEN);

  // 口语：从所有场景中随机抽取
  const todaySpeaking = shuffleWithSeed(scenesDB.map((s,i) => i), rng).slice(0, DAILY_SPEAKING);

  const content = {
    date: today,
    vocab: todayVocab.map(v => v.word),
    grammar: todayGrammar,
    listen: todayListen,
    speaking: todaySpeaking,
  };

  localStorage.setItem('eng_daily_' + today, JSON.stringify(content));
  state.dailyContent = content;
  return content;
}

function getTodayContent() {
  const today = new Date().toISOString().slice(0,10);
  if (state.dailyContent && state.dailyContent.date === today) {
    return state.dailyContent;
  }
  return generateDailyContent();
}

// ===== 间隔重复系统 =====
// 间隔天数：1, 3, 7, 14, 30
const REVIEW_INTERVALS = [1, 3, 7, 14, 30];

function recordReview(word) {
  const today = new Date().toISOString().slice(0,10);
  const data = state.reviewData;
  if (!data[word]) {
    data[word] = { level: 0, lastReview: today };
  } else {
    data[word].level = Math.min(data[word].level + 1, REVIEW_INTERVALS.length - 1);
    data[word].lastReview = today;
  }
  localStorage.setItem('eng_review', JSON.stringify(data));
}

function getDueReviewItems() {
  const today = new Date();
  const data = state.reviewData;
  const due = [];

  for (const [word, info] of Object.entries(data)) {
    const lastDate = new Date(info.lastReview);
    const daysSince = Math.round((today - lastDate) / 86400000);
    const interval = REVIEW_INTERVALS[info.level] || 30;
    if (daysSince >= interval) {
      const vocabItem = vocabDB.find(v => v.word === word);
      if (vocabItem) due.push(vocabItem);
    }
  }

  return { vocab: due };
}

const today = new Date().toISOString().slice(0,10);
if (state.lastDay !== today) {
  // 新的一天，生成今日内容
  generateDailyContent();
  // 计算连续天数
  const lastDate = new Date(state.lastDay);
  const todayDate = new Date(today);
  const diffDays = Math.round((todayDate - lastDate) / 86400000);
  let streak = parseInt(localStorage.getItem('eng_streak') || '0');
  if (diffDays === 1) streak++;
  else if (diffDays > 1) streak = 1;
  localStorage.setItem('eng_streak', streak);
  state.learnedCount = parseInt(localStorage.getItem('eng_learned_yesterday') || '0');
  localStorage.setItem('eng_learned_yesterday', state.learnedCount);
} else {
  // 同一天第一次打开，确保有 streak
  if (!localStorage.getItem('eng_streak') || parseInt(localStorage.getItem('eng_streak')) === 0) {
    localStorage.setItem('eng_streak', '1');
  }
}
state.lastDay = today;
saveState();

let currentAudio = null;
function speak(text, btn, rate) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (!text) return;
  const speed = rate || 0.75;
  const url = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q=' + encodeURIComponent(text);
  const audio = new Audio(url);
  currentAudio = audio;
  if (btn) { btn.classList.add('playing'); audio.onended = audio.onerror = () => { btn.classList.remove('playing'); currentAudio = null; }; }
  audio.play().catch(() => {
    if ('speechSynthesis' in window) {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = speed;
      window.speechSynthesis.speak(u);
    }
    if (btn) setTimeout(() => btn.classList.remove('playing'), 2000);
  });
}

function renderVocab() {
  const daily = getTodayContent();
  const cats = ['今日', '全部', ...new Set(vocabDB.map(v => v.cat))];
  const filtersEl = document.getElementById('vocabFilters');
  filtersEl.innerHTML = cats.map(c =>

  ).join('');
  filtersEl.querySelectorAll('.vocab-filter').forEach(btn => {
    btn.addEventListener('click', () => { state.vocabFilter = btn.dataset.cat; renderVocab(); });
  });

  let items;
  if (state.vocabFilter === '今日') {
    items = daily.vocab.map(w => vocabDB.find(v => v.word === w)).filter(Boolean);
  } else if (state.vocabFilter === '全部') {
    items = vocabDB;
  } else {
    items = vocabDB.filter(v => v.cat === state.vocabFilter);
  }
  const grouped = {};
  items.forEach(v => {
    const key = v.cat + '|' + (v.subcat || '其他');
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(v);
  });

  const difficultyLabels = {1:'基础', 2:'进阶', 3:'高级'};
  const difficultyColors = {1:'rgba(139,171,126,0.12)', 2:'rgba(196,182,154,0.12)', 3:'rgba(196,92,92,0.12)'};
  const difficultyTextColors = {1:'var(--done)', 2:'var(--accent)', 3:'var(--danger)'};

  let html = '';
  for (const [key, words] of Object.entries(grouped)) {
    const [cat, subcat] = key.split('|');
    html += `<div class="vocab-category"><div class="vocab-cat-title">${cat}${subcat !== '其他' ? ' · ' + subcat : ''}</div>`;
    words.forEach((v, i) => {
      const id = v.word;
      const mastered = state.masteredWords.includes(id);
      const reviewInfo = state.reviewData[id];
      let reviewBadge = '';
      if (reviewInfo && !mastered) {
        const lastDate = new Date(reviewInfo.lastReview);
        const daysSince = Math.round((new Date() - lastDate) / 86400000);
        const interval = REVIEW_INTERVALS[reviewInfo.level] || 30;
        if (daysSince >= interval) {
          reviewBadge = `<span style="font-size:10px;padding:1px 6px;background:rgba(196,92,92,0.12);color:var(--danger);border-radius:8px;margin-left:4px">待复习</span>`;
        }
      }
      const diff = v.difficulty || 1;
      const diffBadge = `<span style="font-size:10px;padding:1px 6px;background:${difficultyColors[diff]};color:${difficultyTextColors[diff]};border-radius:8px;margin-left:4px">${difficultyLabels[diff]}</span>`;
      html += `<div class="vocab-item" data-word="${id}" onclick="this.classList.toggle('expanded')">
        <div class="vocab-main">
          <div class="vocab-word">${v.word} <button class="speak-btn" onclick="event.stopPropagation();speak('${v.word.replace(/'/g,"\\'")}',this)" title="朗读">🔊</button>
            <button class="vocab-mastered ${mastered?'done':''}" onclick="event.stopPropagation();toggleMastered('${id}')" title="标记已掌握">${mastered?'✓ 已掌握':'○'}</button>
            ${diffBadge}
            ${reviewBadge}
          </div>
          <div class="vocab-phonetic">${v.phonetic}</div>
          <div class="vocab-meaning">${v.meaning}</div>
          <div class="vocab-detail">
            <div class="vocab-sentence"><span class="en">${v.sentence}</span><br><span class="zh">${v.zh}</span></div>
            <div class="vocab-context">💡 ${v.context}</div>
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  document.getElementById('vocabList').innerHTML = html;
  document.getElementById('statLearned').textContent = state.masteredWords.length;
}

// ===== 语音识别 =====
let recognition = null;
let isRecording = false;

function toggleMic() {
  if (isRecording) { stopMic(); return; }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('你的浏览器不支持语音识别功能，建议用 Chrome 或 Safari 浏览器打开。');
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.continuous = true;

  const micBtn = document.getElementById('micBtn');
  const input = document.getElementById('dialogInput');

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add('recording');
    micBtn.title = '点击停止录音';
    input.placeholder = '正在听你说...';
  };

  recognition.onresult = (e) => {
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    input.value = transcript;
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return;
    // 权限被拒后提示用户设置一次永久权限
    if (e.error === 'not-allowed') {
      stopMic();
      micBtn.title = '请在浏览器地址栏锁图标处永久允许麦克风';
      input.placeholder = '请点击地址栏🔒允许麦克风后再试';
      input.value = '';
      return;
    }
    console.log('Speech recognition error:', e.error);
    stopMic();
  };

  recognition.onend = () => {
    if (isRecording) {
      // 意外停止时自动重试，保持录音状态
      try { recognition.start(); } catch(e) { stopMic(); }
      return;
    }
    stopMic();
  };
  recognition.start();
}

function stopMic() {
  isRecording = false;
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  const micBtn = document.getElementById('micBtn');
  const input = document.getElementById('dialogInput');
  if (micBtn) { micBtn.classList.remove('recording'); micBtn.title = '点击语音输入'; }
  if (input) input.placeholder = '用英语回复...';
}

function submitDialog() {
  const input = document.getElementById('dialogInput');
  const text = input.value.trim();
  if (!text) return;

  const scene = scenesDB[state.currentScene];
  const fb = document.getElementById('dialogFeedback');
  const words = text.toLowerCase().split(/\s+/);
  const keyWords = scene.keyPhrases.join(' ').toLowerCase().split(/\s+/);
  const matched = keyWords.filter(kw => words.some(w => w.includes(kw.replace(/[^a-z]/g,''))));
  const uniqueMatched = [...new Set(matched)];
  const wordCount = words.length;
  let score = Math.min(100, Math.round(uniqueMatched.length / scene.keyPhrases.length * 100));
  if (wordCount < 5) score = Math.max(score - 20, 0);
  if (wordCount > 40) score = Math.max(score - 10, 0);

  // 语法检查
  const grammarIssues = checkGrammarIssues(text);
  const grammarScore = Math.max(0, 100 - grammarIssues.length * 15);
  const totalScore = Math.round(score * 0.5 + grammarScore * 0.5);

  const suggestions = [];
  if (wordCount < 5) suggestions.push('回答太短，试着多说两句');
  if (wordCount > 40) suggestions.push('回答偏长，简洁一些更好');
  if (uniqueMatched.length === 0) suggestions.push('没有匹配到关键表达，可以参考上面提示的句型');
  else suggestions.push('匹配到的表达：' + uniqueMatched.slice(0,3).join(', '));

  let reply = '';
  if (totalScore >= 80) reply = 'Very good! 表达流畅，语法基本正确。';
  else if (totalScore >= 60) reply = 'Not bad! 意思到了，注意看看下面的语法提示。';
  else if (totalScore >= 40) reply = '有进步空间，重点看语法问题。';
  else reply = 'Keep trying! 先参考上面的提示句型，慢慢来。';

  let html = `<div style="margin-bottom:6px"><strong>综合评分：${totalScore}/100</strong> <span style="font-size:11px;color:var(--text-muted)">(表达${score} · 语法${grammarScore})</span></div>`;
  html += suggestions.join('<br>');

  // 语法反馈区块
  if (grammarIssues.length > 0) {
    html += `<div style="margin-top:10px;padding:10px 12px;background:rgba(196,92,92,0.08);border-radius:var(--radius-sm);border-left:3px solid var(--danger);font-size:12px;line-height:1.8">`;
    html += `<div style="font-weight:600;color:var(--danger);margin-bottom:4px">语法检查</div>`;
    grammarIssues.forEach(issue => {
      html += `<div style="margin-bottom:4px">`;
      if (issue.wrong && issue.correct) {
        html += `<span style="color:var(--danger);text-decoration:line-through">${issue.wrong}</span> → <span style="color:var(--done);font-weight:500">${issue.correct}</span>`;
      } else {
        html += `<span style="color:var(--danger)">⚠</span> ${issue.message}`;
      }
      if (issue.explain) html += `<div style="color:var(--text-muted);font-size:11px;margin-top:2px">${issue.explain}</div>`;
      html += `</div>`;
    });
    html += `</div>`;
  } else {
    html += `<div style="margin-top:8px;color:var(--done);font-size:12px">✓ 没有发现明显语法问题</div>`;
  }

  html += `<div style="margin-top:6px;font-style:italic;color:var(--accent)">${reply}</div>`;

  state.dialogHistory.push({ user: text, reply });
  // 记录口语场景完成状态
  const sp = JSON.parse(localStorage.getItem('eng_speaking_done') || '[]');
  if (!sp.includes(state.currentScene)) { sp.push(state.currentScene); localStorage.setItem('eng_speaking_done', JSON.stringify(sp)); }
  fb.style.display = 'block';
  fb.innerHTML = html;

  input.value = '';
  renderDialog();
  fb.scrollIntoView({ behavior: 'smooth' });
}

// ===== 语法检查引擎 =====
function checkGrammarIssues(text) {
  const issues = [];
  const t = text.trim();
  const lower = t.toLowerCase();
  const sentences = t.replace(/([.!?])\s+/g, '$1|||').split('|||').filter(Boolean);

  // 规则1：主谓一致 - 第三人称单数
  const thirdPersonWrong = [
    { re: /\b(he|she|it)\s+(go|do|have|make|take|come|see|know|think|want|need|like|say|tell|get|give|put|run|eat|play|work|live|study|try|help|call|ask|use|open|close|move|start|turn|find|keep|let|read|write|feel|leave|bring|begin|show|hear|offer|provide|send|meet|lead|fall|carry|drive|write|grow|hold|sell|stand|understand|lose|pay|meet|include|set|learn|change|follow|stop|create|speak|read|allow|add|spend|grow|open|walk|win|offer|remember|love|consider|appear|buy|wait|serve|die|send|build|stay|fall|cut|reach|kill|remain|suggest|raise|pass|sell|require|report|decide|pull)\b/gi, msg:'第三人称单数动词需要加 -s/-es', explain:'he/she/it 做主语时，动词要加 s，例如 goes、does、has' },
  ];
  thirdPersonWrong.forEach(rule => {
    let m;
    while ((m = rule.re.exec(lower)) !== null) {
      // 排除情态动词/助动词后面的情况
      const before = lower.slice(Math.max(0, m.index - 20), m.index);
      if (!/\b(can|could|will|would|shall|should|may|might|must|do|does|did|to|not|don't|doesn't|didn't|isn't|aren't|wasn't|won't|hasn't|haven't|hadn't)\s*$/.test(before)) {
        const word = m[0];
        issues.push({ wrong: word, correct: word + (word.endsWith('sh') || word.endsWith('ch') || word.endsWith('s') || word.endsWith('x') || word.endsWith('z') ? 'es' : 's'), message: `主谓一致：he/she/it 后面动词需要变形`, explain: rule.explain });
      }
    }
  });

  // 规则2：缺少主语
  if (/^\s*(go|do|have|make|take|come|see|want|need|like|is|are|am|was|were|will|can|could|should|would)\b/i.test(t) && !/^(yes|no|ok|hello|hi|hey|sure|please|sorry|thanks|thank|excuse|well|so|and|but|or|because|if|when|where|how|what|why|who|which)\b/i.test(t)) {
    const firstWord = t.split(/\s+/)[0];
    issues.push({ wrong: firstWord, correct: null, message: '缺少主语', explain: '英语句子需要主语，例如 "I want..." 而不是直接说 "Want..."' });
  }

  // 规则3：a/an 用错
  const aAnRe = /\b(a)\s+([aeiou])/gi;
  let mA;
  while ((mA = aAnRe.exec(t)) !== null) {
    const word = mA[2];
    if (!/^(univ|uni|use|us[eu]|util)/i.test(word)) {
      issues.push({ wrong: 'a ' + word, correct: 'an ' + word, message: '冠词用法', explain: '元音开头的名词前用 an，不用 a' });
    }
  }

  // 规则4：I 大小写
  if (/\bi\b/.test(t.replace(/I'm|I've|I'll|I'd|I'm/gi, ''))) {
    const fixed = t.replace(/\bi\b/g, 'I');
    issues.push({ wrong: 'i', correct: 'I', message: '英语中 "我" 永远大写', explain: 'I 无论在句首还是句中都要大写' });
  }

  // 规则5：时态混乱标志
  const tenseMixRe = /\b(yesterday|last week|last month|ago|before)\b.*?\b(will|can|shall)\b/gi;
  if (tenseMixRe.test(t)) {
    issues.push({ wrong: null, correct: null, message: '时态矛盾：过去的时间词和将来时混用', explain: '有 yesterday/ago/last week 时应该用过去时，不用 will/can' });
  }

  // 规则6：double 否定
  const doubleNeg = /\b(don't|doesn't|didn't|can't|won't|wouldn't|couldn't|shouldn't|isn't|aren't|wasn't|weren't|never|no|nothing|nobody|nowhere)\b.*?\b(don't|doesn't|didn't|can't|won't|wouldn't|couldn't|shouldn't|never|no|nothing|nobody|nowhere)\b/i;
  if (doubleNeg.test(t)) {
    issues.push({ wrong: null, correct: null, message: '双重否定', explain: '英语中双重否定表示肯定，通常你想表达的是单否定，例如用 "I don\'t know" 而不是 "I don\'t know nothing"' });
  }

  // 规则7：缺少be动词
  if (/\b(I|he|she|it|we|they|you)\s+(very|really|also|always|never|just|already|still|even)\s+\w+/i.test(t)) {
    const match = t.match(/\b(I|he|she|it|we|they|you)\s+(very|really|also|always|never|just|already|still|even)\s+(\w+)/i);
    if (match) {
      issues.push({ wrong: match[0], correct: null, message: '可能缺少 be 动词', explain: '例如 "I very happy" 应该是 "I am very happy"' });
    }
  }

  // 规则8：拼写常见错误
  const commonMistakes = [
    [/(\w+)ed\b/g, (m) => { if (/[^aeiou]y$/.test(m[1]) && !/ed$/.test(m[0])) return [m[0], m[1] + 'ied']; return null; }],
  ];
  // 规则9：could of / should of / would of
  if (/\b(could|should|would|might)\s+of\b/i.test(t)) {
    const match = t.match(/\b(could|should|would|might)\s+of\b/i);
    issues.push({ wrong: match[0], correct: match[1] + ' have', message: '固定搭配错误', explain: '应该是 ' + match[1] + ' have，不是 ' + match[1] + ' of' });
  }

  // 规则10：there is + 复数
  if (/\bthere\s+is\s+\w*\s*(many|few|several|a\s+few|two|three|four|five|\d+)\b/i.test(t))
    issues.push({ wrong: 'there is + 复数', correct: 'there are', message: '主谓一致', explain: '后面跟复数名词时用 there are' });

  // 规则11：more + 短形容词
  if (/\bmore\s+(big|small|tall|short|fast|slow|good|bad|nice|hot|cold|long|old|new|high|low|fat|thin)\b/i.test(t)) {
    const match = t.match(/\bmore\s+(big|small|tall|short|fast|slow|good|bad|nice|hot|cold|long|old|new|high|low|fat|thin)\b/i);
    const map = {big:'bigger',small:'smaller',tall:'taller',short:'shorter',fast:'faster',slow:'slower',good:'better',bad:'worse',nice:'nicer',hot:'hotter',cold:'colder',long:'longer',old:'older',new:'newer',high:'higher',low:'lower',fat:'fatter',thin:'thinner'};
    issues.push({ wrong: match[0], correct: map[match[1].toLowerCase()], message: '比较级形式', explain: '短形容词直接加 -er，不用 more' });
  }

  // 规则12：I am vs I is
  if (/\bi\s+is\b/i.test(t))
    issues.push({ wrong: 'I is', correct: 'I am', message: '人称与be动词', explain: '第一人称用 am，不用 is' });

  // 规则13：do/does 后面动词原形
  if (/\b(does|doesn't)\s+\w+(s|es|ed)\b/i.test(t) && !/\b(does|doesn't)\s+(go|do|have|say|see|get|make|take|come|know|think|want|need|like|look|feel|try|find|give|tell|say|put|say|watch|catch|teach|reach|touch|wash|push|finish|miss|pass|kiss)\b/i.test(t)) {
    const match = t.match(/\b(does|doesn't)\s+(\w+(s|es))\b/i);
    if (match && !['says','does','goes','has'].includes(match[2].toLowerCase()))
      issues.push({ wrong: match[0], correct: match[1] + ' ' + match[2].replace(/s$|es$/, ''), message: '助动词后用原形', explain: 'does/doesn\'t 后面动词要用原形，不要加 s' });
  }

  // 规则14：was/were 用错
  if (/\b(i|he|she|it)\s+were\b/i.test(t))
    issues.push({ wrong: t.match(/\b(i|he|she|it)\s+were\b/i)[0], correct: t.match(/\b(i|he|she|it)\b/i)[0] + ' was', message: '主谓一致', explain: '单数主语用 was，不用 were' });
  if (/\b(we|they|you)\s+was\b/i.test(t) && !/\byou\s+was\b/i.test(t))
    issues.push({ wrong: t.match(/\b(we|they)\s+was\b/i)[0], correct: t.match(/\b(we|they)\b/i)[0] + ' were', message: '主谓一致', explain: '复数主语用 were，不用 was' });

  // 限制最多返回5个问题
  return issues.slice(0, 5);
}

// ===== 语法模块 =====
function renderGrammar() {
  const daily = getTodayContent();
  let html = '';
  daily.grammar.forEach(i => {
    const g = grammarDB[i];
    html += `<div class="card grammar-card" onclick="this.classList.toggle('expanded')">
      <div class="card-title">${g.icon} ${g.title}</div>
      <div class="card-desc">${g.desc}</div>
      <div class="grammar-detail">
        ${g.detail}
        <div class="grammar-quiz" onclick="event.stopPropagation()">
          <div class="quiz-q">${g.quiz.q}</div>
          <div class="quiz-options" id="quiz_${i}">
            ${g.quiz.opts.map((opt, j) => `<button class="quiz-opt" data-idx="${j}" onclick="checkGrammar(${i},${j})">${opt}</button>`).join('')}
          </div>
          <div class="quiz-explain" id="explain_${i}">${g.quiz.explain}</div>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('grammarList').innerHTML = html;
}

function checkGrammar(quizIdx, optIdx) {
  const g = grammarDB[quizIdx];
  const container = document.getElementById('quiz_' + quizIdx);
  container.querySelectorAll('.quiz-opt').forEach(btn => {
    btn.disabled = true;
    if (parseInt(btn.dataset.idx) === g.quiz.answer) btn.classList.add('correct');
    else if (parseInt(btn.dataset.idx) === optIdx && optIdx !== g.quiz.answer) btn.classList.add('wrong');
  });
  document.getElementById('explain_' + quizIdx).style.display = 'block';
  state.learnedCount++;
  saveState();
  // 记录语法完成状态
  const gd = JSON.parse(localStorage.getItem('eng_grammar_done') || '[]');
  if (!gd.includes(quizIdx)) { gd.push(quizIdx); localStorage.setItem('eng_grammar_done', JSON.stringify(gd)); }
}

// ===== 听力模块 =====

  const daily = getTodayContent();

function checkListen(listenIdx, optIdx) {
  const l = listenDB[listenIdx];
  const container = document.getElementById('listenOpts_' + listenIdx);
  container.querySelectorAll('.listen-opt').forEach(btn => {
    btn.disabled = true;
    if (parseInt(btn.dataset.idx) === l.answer) btn.classList.add('correct');
    else if (parseInt(btn.dataset.idx) === optIdx && optIdx !== l.answer) btn.classList.add('wrong');
  });
  document.getElementById('listenAns_' + listenIdx).style.display = 'block';
  // 记录听力完成状态
  const ld = JSON.parse(localStorage.getItem('eng_listen_done') || '[]');
  if (!ld.includes(listenIdx)) { ld.push(listenIdx); localStorage.setItem('eng_listen_done', JSON.stringify(ld)); }
}

document.querySelectorAll('.speed-btn').forEach(btn => {

function renderProgress() {
  const totalVocab = vocabDB.length;

  // 复习统计
  const dueReview = getDueReviewItems();
  const totalInReview = Object.keys(state.reviewData).length;

  // 词汇：按分类统计
  const vocabCats = {};
  vocabDB.forEach(v => { if (!vocabCats[v.cat]) vocabCats[v.cat] = { total: 0, done: 0 }; vocabCats[v.cat].total++; if (state.masteredWords.includes(v.word)) vocabCats[v.cat].done++; });

  // 语法：用 localStorage 记录做对了哪些题
  const grammarDone = JSON.parse(localStorage.getItem('eng_grammar_done') || '[]');

  // 听力：用 localStorage 记录做对了哪些题

          <div class="progress-bar-label"><span>总进度</span><span>${speakingPct}%</span></div>

// ===== 导出进度 =====
function exportProgress() {
  const totalVocab = vocabDB.length;
  const mastered = state.masteredWords.length;
  const grammarDone = JSON.parse(localStorage.getItem('eng_grammar_done') || '[]');
  const listenDone = JSON.parse(localStorage.getItem('eng_listen_done') || '[]');
  const speakingDone = JSON.parse(localStorage.getItem('eng_speaking_done') || '[]');
  const streak = parseInt(localStorage.getItem('eng_streak') || '0');
  const today = new Date().toISOString().slice(0,10);

  const vocabByCat = {};
  vocabDB.forEach(v => { if (!vocabByCat[v.cat]) vocabByCat[v.cat] = { total: 0, done: 0 }; vocabByCat[v.cat].total++; if (state.masteredWords.includes(v.word)) vocabByCat[v.cat].done++; });

  const progress = {
    exported_at: new Date().toISOString(),
    date: today,
    streak: streak,
    vocabulary: {
      total: totalVocab,
      mastered: mastered,
      mastered_list: state.masteredWords,
      by_category: vocabByCat
    },
    grammar: {
      total: grammarDB.length,
      completed: grammarDone.length,
      completed_items: grammarDone.map(i => grammarDB[i].title)
    },
    listening: {
      total: listenDB.length,
      completed: listenDone.length,
      completed_items: listenDone.map(i => listenDB[i].scene)
    },
    speaking: {
      total: scenesDB.length,
      completed: speakingDone.length,
      completed_items: speakingDone.map(i => scenesDB[i].name)
    }
  };

  const json = JSON.stringify(progress, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '英语通进度_' + today + '.json';
  a.click();
  URL.revokeObjectURL(url);

  const msg = document.getElementById('exportMsg');
  msg.style.display = 'block';
  msg.style.color = 'var(--done)';
  msg.textContent = '已导出！文件保存在下载文件夹。';
  setTimeout(() => { msg.style.display = 'none'; }, 3000);
}
